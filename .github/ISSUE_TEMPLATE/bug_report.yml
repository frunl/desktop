name: Bug report
description: Report a Frunl Desktop problem
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a Frunl Desktop bug. Please remove passwords, API keys, access tokens, customer data, and private workspace details before posting.
  - type: input
    id: version
    attributes:
      label: Frunl Desktop version
      description: Find this in the release you downloaded or in the app if it opens.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: macos-version
    attributes:
      label: macOS version
      placeholder: "15.5"
    validations:
      required: true
  - type: dropdown
    id: architecture
    attributes:
      label: Mac architecture
      options:
        - Apple Silicon
        - Intel
        - Not sure
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Summarize the problem in a sentence or two.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the smallest set of steps that reproduces the issue.
      placeholder: |
        1. Open Frunl Desktop
        2. Go to ...
        3. Click ...
        4. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect Frunl Desktop to do?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What did Frunl Desktop do instead?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots or logs
      description: Add screenshots or redacted logs if they help. Do not include credentials, tokens, customer data, or private workspace details.
      render: text
    validations:
      required: false
  - type: checkboxes
    id: redaction
    attributes:
      label: Public issue safety
      options:
        - label: I removed passwords, API keys, access tokens, customer data, and private workspace details from this report.
          required: true
